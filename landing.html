<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join the Group</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 2rem;
    }

    h1 {
      font-size: 26px;
      font-weight: 600;
      color: #111111;
      margin-bottom: 2.5rem;
      text-align: center;
    }

    .buttons {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      background: #E24B4A;
      color: #ffffff;
      text-decoration: none;
      border-radius: 18px;
      padding: 18px 52px;
      font-size: 18px;
      font-weight: 500;
      display: inline-block;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn:hover {
      opacity: 0.88;
    }

    .btn:active {
      transform: scale(0.97);
    }
  </style>
</head>
<body>
  <h1>Are you a male or female?</h1>
  <div class="buttons">
    <a class="btn" href="https://chat.whatsapp.com/BIlf1CwFnFgJuVqkpNMmDU" target="_blank">Male</a>
    <a class="btn" href="https://chat.whatsapp.com/BIlf1CwFnFgJuVqkpNMmDU" target="_blank">Female</a>
  </div>
</body>
</html>
